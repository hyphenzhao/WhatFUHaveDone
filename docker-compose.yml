version: '3'

services:
  app:
    build: .
    network_mode: host
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=3307
      - DB_NAME=worklog
      - DB_USER=worklog
      - DB_PASS=worklog_pass_2024

  db:
    image: mysql:8.0
    command: --port=3307 --default-authentication-plugin=mysql_native_password
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: worklog
      MYSQL_USER: worklog
      MYSQL_PASSWORD: worklog_pass_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped

volumes:
  mysql_data:
